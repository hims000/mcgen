name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix script permissions
        run: chmod +x scripts/*.sh

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build libgtest-dev libgmock-dev zlib1g-dev libsnappy-dev

      - name: Build leveldb-mcpe
        run: |
          git clone --depth 1 https://github.com/Amulet-Team/leveldb-mcpe.git
          cd leveldb-mcpe
          sed -i 's/zlibstatic/${ZLIB_LIBRARIES}/g' CMakeLists.txt
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo cp libleveldb_mcpe.so /usr/local/lib/
          sudo ln -sf /usr/local/lib/libleveldb_mcpe.so /usr/local/lib/libleveldb.so
          sudo cp -r ../include/leveldb /usr/local/include/
          sudo ldconfig

      - name: Verify LevelDB installation
        run: ./scripts/check-leveldb.sh --ci

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -G Ninja

      - name: Build
        run: cmake --build build --config ${BUILD_TYPE}

      - name: Run tests
        run: ./build/mcgen_tests

      - name: Test CLI
        run: |
          ./build/mcgen --help
          ./build/mcgen --seed "ci-test" --name "CIWorld" --platform java --radius 1 --output /tmp/mcgen-ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcgen-ubuntu-x64
          path: |
            build/mcgen
            build/mcgen_tests

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt update || true
          sudo apt install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu cmake ninja-build

      - name: Build zlib for ARM64
        run: |
          wget -q https://zlib.net/fossils/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          CC=aarch64-linux-gnu-gcc ./configure --prefix=/usr/aarch64-linux-gnu
          make -j$(nproc)
          sudo make install

      - name: Build
        run: |
          cmake -B build-arm -S . -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DCMAKE_TOOLCHAIN_FILE=cmake/arm64-toolchain.cmake -G Ninja
          cmake --build build-arm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcgen-ubuntu-arm64
          path: build-arm/mcgen

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja googletest snappy zlib

      - name: Build leveldb-mcpe
        run: |
          git clone --depth 1 https://github.com/Amulet-Team/leveldb-mcpe.git
          cd leveldb-mcpe
          sed -i '' 's/zlibstatic/${ZLIB_LIBRARIES}/g' CMakeLists.txt
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix zlib)" ..
          make -j$(sysctl -n hw.ncpu)
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo cp libleveldb_mcpe.dylib /usr/local/lib/
          sudo ln -sf /usr/local/lib/libleveldb_mcpe.dylib /usr/local/lib/libleveldb.dylib
          sudo cp -r ../include/leveldb /usr/local/include/

      - name: Build mcgen
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -G Ninja -DCMAKE_PREFIX_PATH="$(brew --prefix zlib)"
          cmake --build build

      - name: Run tests
        run: ./build/mcgen_tests

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcgen-macos
          path: |
            build/mcgen
            build/mcgen_tests

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove vcpkg.json for classic mode
        run: Remove-Item -Path vcpkg.json -ErrorAction SilentlyContinue

      - name: Install dependencies via vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install zlib snappy gtest --triplet x64-windows

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcgen-windows
          path: |
            build/Release/mcgen.exe
            build/Release/mcgen_tests.exe
